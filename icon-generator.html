<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标生成器 - Potato Todo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 40px;
            text-align: center;
        }
        h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .icons-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }
        .icon-item {
            background: #16213e;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .icon-item canvas {
            border-radius: 20%;
            margin-bottom: 10px;
        }
        .icon-item p {
            margin: 10px 0;
            color: #a0a0b0;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            opacity: 0.9;
        }
        .download-all {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 16px;
        }
        .instructions {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .instructions h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .instructions ol {
            color: #a0a0b0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🥔 Potato Todo 图标生成器</h1>
    <p>点击下方按钮下载各尺寸图标</p>
    
    <div class="icons-grid" id="iconsGrid"></div>
    
    <button class="download-all" onclick="downloadAll()">下载全部图标</button>
    
    <div class="instructions">
        <h3>使用说明</h3>
        <ol>
            <li>点击上方"下载全部图标"按钮</li>
            <li>将下载的图标文件放入 <code>icons/</code> 文件夹</li>
            <li>确保文件名正确（如 icon-192.png）</li>
            <li>刷新应用即可看到新图标</li>
        </ol>
    </div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const iconsGrid = document.getElementById('iconsGrid');
        
        function drawIcon(ctx, size) {
            const scale = size / 512;
            
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.195);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            
            ctx.beginPath();
            ctx.roundRect(140 * scale, 160 * scale, 232 * scale, 40 * scale, 8 * scale);
            ctx.fill();
            
            ctx.beginPath();
            ctx.roundRect(140 * scale, 236 * scale, 180 * scale, 40 * scale, 8 * scale);
            ctx.fill();
            
            ctx.beginPath();
            ctx.roundRect(140 * scale, 312 * scale, 210 * scale, 40 * scale, 8 * scale);
            ctx.fill();
            
            ctx.globalAlpha = 0.9;
            ctx.beginPath();
            ctx.arc(380 * scale, 380 * scale, 70 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(365 * scale, 350 * scale, 30 * scale, 60 * scale, 4 * scale);
            ctx.fill();
            
            ctx.beginPath();
            ctx.roundRect(350 * scale, 365 * scale, 60 * scale, 30 * scale, 4 * scale);
            ctx.fill();
        }
        
        sizes.forEach(size => {
            const item = document.createElement('div');
            item.className = 'icon-item';
            
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            drawIcon(ctx, size);
            
            const label = document.createElement('p');
            label.textContent = `${size}x${size}`;
            
            const btn = document.createElement('button');
            btn.textContent = '下载';
            btn.onclick = () => downloadIcon(canvas, size);
            
            item.appendChild(canvas);
            item.appendChild(label);
            item.appendChild(btn);
            iconsGrid.appendChild(item);
        });
        
        function downloadIcon(canvas, size) {
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        function downloadAll() {
            sizes.forEach((size, index) => {
                setTimeout(() => {
                    const canvas = document.querySelector(`.icon-item:nth-child(${index + 1}) canvas`);
                    downloadIcon(canvas, size);
                }, index * 200);
            });
        }
    </script>
</body>
</html>
